name: webpage

on:
    push:
        branches: [main]

permissions:
      contents: read
      pages: write      # to deploy to Pages
      id-token: write

jobs:
    deploy:
        runs-on: ubuntu-latest

        environment:
            name: github-pages        # ← the name of the environment
            url: ${{ steps.deployment.outputs.page_url }}  # ← live URL shown in GitHub UI

        steps:
            #get access to webpage code via a pre-built actions
            - name: Checkout Code
              uses: actions/checkout@v4

            # setup Github Pages
            - name: Setup Github pages
              uses: actions/configure-pages@v4

            #static code artifacts
            - name: Upload static files
              uses: actions/upload-pages-artifact@v4

            - name: Deploy to Github pages
              uses: actions/deploy-pages@v4

            - name: Setup Github Pages
              uses: actions/configure-pages@v4
              with:
                enablement: true    


             

